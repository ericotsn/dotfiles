# Basic tmux settings everyone can agree on
# See: https://github.com/tmux-plugins/tmux-sensible

# Address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 0

# Increase scrollback buffer size from 2000 to 50000 lines
set -g history-limit 50000

# Increase tmux messages display duration from 750ms to 4s
set -g display-time 4000

# Refresh 'status-left' and 'status-right' more often, from every 15s
# to 5s.
set -g status-interval 5

# Upgrade $TERM
set -g default-terminal "tmux-256color"

# Emacs key bindings in tmux command prompt (prefix + :) are better
# than vi keys, even for vim users.
set -g status-keys emacs

# Focus events enabled for terminals that support them
set -g focus-events on

# Super useful when using "grouped sessions" and multi-monitor setup
setw -g aggressive-resize on

# Enable extended keys (CSI u encoding) for proper modifier key
# support. Allows Shift+Enter, Ctrl+Shift+<key>, etc. to work
# correctly in apps.
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Enable mouse support
set -g mouse on

# Unbind <C-b> as the prefix key
unbind C-b

# Set prefix to <C-Space>
set -g prefix C-Space
bind C-Space send-prefix

# Start window and pane numbering at 1 (more intuitive than 0)
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on  # Automatically renumber windows when one is closed

# Catppuccin Latte
# See: https://catppuccin.com/palette/
set -g message-style bg="#dce0e8",fg="#4c4f69"
set -g mode-style bg="#8839ef",fg="#eff1f5",bold
set -g pane-active-border-style fg="#1e66f5"
set -g pane-border-style fg="#bcc0cc"
set -g status-left ""
set -g status-position top
set -g status-right "#[bg=#40a02b,fg=#eff1f5,bold] session #[bg=#dce0e8,fg=#4c4f69,nobold] #S "
set -g status-style bg="#eff1f5",fg="#4c4f69"
set -g window-status-current-format "#[bg=#8839ef,fg=#eff1f5,bold] #I #[bg=#dce0e8,fg=#4c4f69,nobold] #W "
set -g window-status-current-style bg="#eff1f5",fg="#4c4f69"
set -g window-status-format " #I  #W "
set -g window-status-style bg="#eff1f5",fg="#7c7f93"
